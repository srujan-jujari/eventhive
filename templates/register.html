{% extends "base.html" %}

{% block title %}Register - EventHive{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 pt-2">
    <div class="col-md-5">
        <div class="card auth-card shadow-lg border-0 bg-glassmorphism text-white">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-light opacity-75">Join EventHive setup your profile</p>
                </div>
                
                <form action="{{ url_for('register') }}" method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label opacity-75">Username</label>
                        <input type="text" class="form-control form-control-lg bg-dark text-white border-secondary" id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label opacity-75">Password</label>
                        <input type="password" class="form-control form-control-lg bg-dark text-white border-secondary" id="password" name="password" required>
                    </div>
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow glass-btn">Sign Up</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0 opacity-75">Already have an account? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Login here</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
